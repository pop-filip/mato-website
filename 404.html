<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Mato Davidovic</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%230a0a0a'/%3E%3Ctext x='32' y='50' font-family='Georgia%2C %22Times New Roman%22%2C serif' font-size='46' font-weight='400' fill='%23c8a45a' text-anchor='middle' letter-spacing='-1'%3Em%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:#0a0a0a;
    color:#fff;
    font-family:'Cormorant Garamond',Georgia,serif;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    text-align:center;
    padding:2rem;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 100%, rgba(200,164,90,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 50% 0%, rgba(200,164,90,0.04) 0%, transparent 60%);
    pointer-events:none;
  }
  .wrap{max-width:560px;position:relative}
  .num{
    font-family:'Playfair Display',Georgia,serif;
    font-size:clamp(100px,20vw,180px);
    font-weight:700;
    line-height:1;
    color:transparent;
    -webkit-text-stroke:1px rgba(200,164,90,0.35);
    letter-spacing:-4px;
    margin-bottom:1rem;
    user-select:none;
  }
  .label{
    font-size:.65rem;
    letter-spacing:.45em;
    text-transform:uppercase;
    color:rgba(200,164,90,0.6);
    margin-bottom:1.5rem;
  }
  h1{
    font-family:'Playfair Display',Georgia,serif;
    font-size:clamp(1.6rem,4vw,2.4rem);
    font-weight:400;
    color:#fff;
    margin-bottom:1rem;
    letter-spacing:-0.5px;
  }
  p{
    font-size:1rem;
    color:rgba(255,255,255,0.45);
    line-height:1.7;
    margin-bottom:2.5rem;
    font-weight:300;
  }
  .btn{
    display:inline-block;
    background:transparent;
    border:1px solid rgba(200,164,90,0.5);
    color:#c8a45a;
    text-decoration:none;
    padding:.75rem 2rem;
    font-size:.75rem;
    letter-spacing:.35em;
    text-transform:uppercase;
    font-family:'Cormorant Garamond',Georgia,serif;
    transition:all .25s ease;
  }
  .btn:hover{
    background:rgba(200,164,90,0.1);
    border-color:rgba(200,164,90,0.8);
    color:#e2c47a;
  }
  .brand{
    position:fixed;
    top:1.5rem;
    left:50%;
    transform:translateX(-50%);
    font-family:'Playfair Display',Georgia,serif;
    font-size:1.1rem;
    color:rgba(200,164,90,0.7);
    letter-spacing:.15em;
    text-decoration:none;
  }
  .brand em{color:#c8a45a;font-style:normal}
</style>
</head>
<body>
<a class="brand" href="/">mato<em>.</em></a>
<div class="wrap">
  <div class="num">404</div>
  <div class="label">Page not found</div>
  <h1>This frame is out of focus</h1>
  <p>The page you're looking for has moved, been deleted,<br>or never existed. Let's get you back on set.</p>
  <a class="btn" href="/">← Back to homepage</a>
</div>
</body>
</html>
